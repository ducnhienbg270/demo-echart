<div class="dashboard-container">
  <h1>Dashboard Analytics</h1>
  
  <div nz-row [nzGutter]="16">
    <!-- Column Chart -->
    <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12" [nzLg]="12" [nzXl]="12">
      <nz-card nzTitle="Column Chart" class="chart-card">
        <div echarts [options]="columnChartOption" class="chart"></div>
      </nz-card>
    </div>

    <!-- Area Chart -->
    <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12" [nzLg]="12" [nzXl]="12">
      <nz-card nzTitle="Area Chart" class="chart-card">
        <div echarts [options]="areaChartOption" class="chart"></div>
      </nz-card>
    </div>
  </div>

  <div nz-row [nzGutter]="16" style="margin-top: 16px;">
    <!-- Line Chart -->
    <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12" [nzLg]="12" [nzXl]="12">
      <nz-card nzTitle="Line Chart" class="chart-card">
        <div echarts [options]="lineChartOption" class="chart"></div>
      </nz-card>
    </div>

    <!-- Pie Chart -->
    <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12" [nzLg]="12" [nzXl]="12">
      <nz-card nzTitle="Pie Chart" class="chart-card">
        <div echarts [options]="pieChartOption" class="chart"></div>
      </nz-card>
    </div>
  </div>
</div>
