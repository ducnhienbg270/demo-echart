<nz-layout class="app-layout">
  <nz-sider class="menu-sidebar" nzCollapsible nzWidth="256px" nzBreakpoint="md" [(nzCollapsed)]="isCollapsed">
    <div class="sidebar-logo">
      <h1>Dashboard</h1>
    </div>
    <ul nz-menu nzTheme="dark" nzMode="inline" [nzInlineCollapsed]="isCollapsed">
      <li nz-submenu nzOpen nzTitle="Dashboard" nzIcon="dashboard">
        <ul>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="/dashboard">
              <span nz-icon nzType="pie-chart"></span>
              <span>Analytics</span>
            </a>
          </li>
          <li nz-menu-item>
            <span nz-icon nzType="bar-chart"></span>
            <span>Reports</span>
          </li>
        </ul>
      </li>
      <li nz-submenu nzTitle="Charts" nzIcon="area-chart">
        <ul>
          <li nz-menu-item>
            <span nz-icon nzType="line-chart"></span>
            <span>Line Charts</span>
          </li>
          <li nz-menu-item>
            <span nz-icon nzType="bar-chart"></span>
            <span>Bar Charts</span>
          </li>
          <li nz-menu-item>
            <span nz-icon nzType="dot-chart"></span>
            <span>Pie Charts</span>
          </li>
        </ul>
      </li>
      <li nz-menu-item nzMatchRouter>
        <a routerLink="/map">
          <span nz-icon nzType="global"></span>
          <span>Map</span>
        </a>
      </li>
      <li nz-menu-item nzMatchRouter>
        <a routerLink="/trading">
          <span nz-icon nzType="stock"></span>
          <span>Trading</span>
        </a>
      </li>
      <li nz-submenu nzTitle="Games" nzIcon="trophy">
        <ul>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="/games">
              <span nz-icon nzType="appstore"></span>
              <span>Game Center</span>
            </a>
          </li>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="/games/red-button">
              <span nz-icon nzType="fire"></span>
              <span>Red Button</span>
            </a>
          </li>
        </ul>
      </li>
      <li nz-submenu nzTitle="Training" nzIcon="read">
        <ul>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="/training">
              <span nz-icon nzType="book"></span>
              <span>AWS Certifications</span>
            </a>
          </li>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="/training/solutions-architect">
              <span nz-icon nzType="cloud"></span>
              <span>Solutions Architect</span>
            </a>
          </li>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="/training/developer">
              <span nz-icon nzType="code"></span>
              <span>Developer</span>
            </a>
          </li>
        </ul>
      </li>
      <li nz-menu-item>
        <span nz-icon nzType="table"></span>
        <span>Tables</span>
      </li>
      <li nz-menu-item>
        <span nz-icon nzType="form"></span>
        <span>Forms</span>
      </li>
      <li nz-menu-item>
        <span nz-icon nzType="setting"></span>
        <span>Settings</span>
      </li>
    </ul>
  </nz-sider>
  <nz-layout>
    <nz-header>
      <div class="app-header">
        <span class="header-trigger" (click)="isCollapsed = !isCollapsed">
          <span class="trigger" nz-icon [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"></span>
        </span>
        <span class="header-title">ECharts Dashboard</span>
      </div>
    </nz-header>
    <nz-content>
      <div class="inner-content">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
